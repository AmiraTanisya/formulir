<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Kepuasan Klien</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Formulir <br> Kepuasan Klien</h1>
        <p>Terima kasih telah bekerja sama dengan AmanMedia. 
        Silakan lengkapi formulir di bawah ini untuk memberikan umpan balik Anda.</p>

        <ul>
            <li>Secure SSL Encryption</li>
            <li>Data Protected & Private</li>
            <li>24/7 Dedicated Support</li>
        </ul>
    </div>

    <div class="right">
        <form>
            
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama lengkap" required>

            <label>Email</label>
            <input type="email" placeholder="nama@email.com" required>

            <label>Nama Proyek</label>
            <input type="text" placeholder="Contoh: Website Redesign">

            <label>Tingkat Kepuasan</label>
            <div class="rating">
                <input type="radio" name="rating" id="star5" value="5">
                <label for="star5">★</label>

                <input type="radio" name="rating" id="star4" value="4">
                <label for="star4">★</label>

                <input type="radio" name="rating" id="star3" value="3">
                <label for="star3">★</label>

                <input type="radio" name="rating" id="star2" value="2">
                <label for="star2">★</label>

                <input type="radio" name="rating" id="star1" value="1">
                <label for="star1">★</label>
            </div>

            <label>Pesan / Testimoni</label>
            <textarea rows="4" placeholder="Ceritakan pengalaman Anda bekerja sama dengan kami..."></textarea>

            <button type="submit">Kirim Testimoni</button>

        </form>
    </div>

</div>

</body>
</html>
